<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlightGPT</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=3" />
    <link rel="shortcut icon" type="image/png" href="/favicon-32x32.png?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #eff5ff;
        background:
          linear-gradient(
            180deg,
            rgba(7, 15, 28, 0.45) 0%,
            rgba(7, 15, 28, 0.58) 100%
          ),
          url("./dominic-bieri-VTCQghTSivk-unsplash.jpg") center center / cover no-repeat fixed;
      }

      .app {
        max-width: 920px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
      }

      .header {
        margin-bottom: 16px;
        color: #f5f8ff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .header p {
        margin: 0;
        color: rgba(245, 248, 255, 0.9);
      }

      .chat-shell {
        background: rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(7, 15, 28, 0.22);
        display: flex;
        flex-direction: column;
        min-height: 70vh;
        overflow: hidden;
      }

      .messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: rgba(255, 255, 255, 0.08);
      }

      .message {
        max-width: 85%;
        padding: 14px 16px;
        border-radius: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: rgba(27, 110, 243, 0.72);
        color: #ffffff;
      }

      .message.assistant {
        align-self: flex-start;
        background: rgba(240, 245, 252, 0.42);
        color: #10233f;
      }

      .message.system {
        align-self: center;
        background: rgba(237, 242, 247, 0.35);
        color: #49617f;
        font-size: 0.95rem;
      }

      .composer {
        border-top: 1px solid rgba(201, 212, 224, 0.28);
        padding: 16px;
        display: flex;
        gap: 12px;
        background: rgba(251, 253, 255, 0.24);
      }

      .composer textarea {
        flex: 1;
        resize: vertical;
        min-height: 56px;
        max-height: 180px;
        border: 1px solid rgba(201, 212, 224, 0.45);
        border-radius: 12px;
        padding: 14px;
        font: inherit;
        background: rgba(255, 255, 255, 0.34);
        color: #10233f;
      }

      .composer textarea::placeholder {
        color: rgba(16, 35, 63, 0.62);
      }

      .composer button {
        align-self: flex-end;
        border: none;
        border-radius: 12px;
        background: #10233f;
        color: #ffffff;
        padding: 14px 18px;
        font: inherit;
        cursor: pointer;
      }

      .composer button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .status {
        min-height: 24px;
        padding: 0 16px 16px;
        color: rgba(16, 35, 63, 0.82);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>FlightGPT</h1>
        <p>
          Ask about live flights, aviation terms, route distances, and airport status.
        </p>
        <a href="/map" style="display:inline-block;margin-top:8px;color:#7eb8ff;text-decoration:none;font-size:0.95rem;">🗺 Live Map</a>
      </header>

      <section class="chat-shell">
        <div class="messages" id="messages"></div>
        <form class="composer" id="chat-form">
          <textarea
            id="message-input"
            name="message"
            placeholder="Ask something like: What's flying over Utah right now?"
            required
            autofocus
          ></textarea>
          <button id="send-button" type="submit">Send</button>
        </form>
        <div class="status" id="status"></div>
      </section>
    </main>

    <script>
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("chat-form");
      const inputEl = document.getElementById("message-input");
      const sendButtonEl = document.getElementById("send-button");
      const statusEl = document.getElementById("status");

      let history = [];

      function renderMessage(role, content) {
        const messageEl = document.createElement("div");
        messageEl.className = `message ${role}`;
        messageEl.textContent = content;
        messagesEl.appendChild(messageEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setBusy(isBusy, statusText = "") {
        inputEl.disabled = isBusy;
        sendButtonEl.disabled = isBusy;
        statusEl.textContent = statusText;

        if (!isBusy) {
          inputEl.focus();
        }
      }

      renderMessage(
        "assistant",
        "Hello! I am FlightGPT. Ask me about aircraft, routes, airport delays, or flights over a supported location like Utah or JFK.",
      );

      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          formEl.requestSubmit();
        }
      });

      const urlQuery = new URLSearchParams(window.location.search).get("q");

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();

        const message = inputEl.value.trim();

        if (!message) {
          return;
        }

        renderMessage("user", message);
        inputEl.value = "";
        setBusy(true, "FlightGPT is thinking...");

        try {
          const response = await fetch("/chat/stream", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "text/event-stream",
            },
            body: JSON.stringify({
              message,
              history,
            }),
          });

          if (!response.ok) {
            const contentType = response.headers.get("content-type") || "";

            if (contentType.includes("application/json")) {
              const payload = await response.json();
              throw new Error(payload.error || "Request failed.");
            }

            const errorText = await response.text();

            if (
              response.status === 404 &&
              errorText.includes("Cannot POST /chat/stream")
            ) {
              throw new Error(
                "Streaming endpoint is not available yet. Restart the server and try again.",
              );
            }

            throw new Error(`Request failed with status ${response.status}.`);
          }

          if (!response.body) {
            throw new Error("Streaming is not available.");
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          let didReceiveFinalReply = false;

          while (true) {
            const { value, done } = await reader.read();

            if (done) {
              break;
            }

            buffer += decoder.decode(value, { stream: true });

            const events = buffer.split("\n\n");
            buffer = events.pop() ?? "";

            for (const rawEvent of events) {
              const dataLines = rawEvent
                .split("\n")
                .filter((line) => line.startsWith("data: "))
                .map((line) => line.slice(6));

              if (dataLines.length === 0) {
                continue;
              }

              const payload = JSON.parse(dataLines.join("\n"));

              if (payload.type === "step" && typeof payload.label === "string") {
                setBusy(true, payload.label);

                if (payload.stepType && payload.stepType !== "status") {
                  renderMessage("system", payload.label);
                }

                continue;
              }

              if (payload.type === "done") {
                history = Array.isArray(payload.history) ? payload.history : history;
                renderMessage("assistant", payload.reply || "No reply returned.");
                didReceiveFinalReply = true;
                continue;
              }

              if (payload.type === "error") {
                throw new Error(payload.error || "Streaming request failed.");
              }
            }
          }

          if (!didReceiveFinalReply) {
            throw new Error("Streaming ended before a final reply was returned.");
          }

          setBusy(false, "");
        } catch (error) {
          const messageText =
            error instanceof Error ? error.message : "Unknown UI error.";
          renderMessage("system", `Error: ${messageText}`);
          setBusy(false, "Request failed.");
        }
      });

      if (urlQuery) {
        inputEl.value = urlQuery;
        formEl.requestSubmit();
      }
    </script>
  </body>
</html>
